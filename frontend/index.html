<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validity — Agentic Claim Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Tailwind base reset */
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; }

      /* Fade-in animation for ThoughtPanel entries */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-in { animation: fadeIn 0.2s ease-out forwards; }

      /* Smooth scrollbar for log areas */
      .log-scroll::-webkit-scrollbar { width: 6px; }
      .log-scroll::-webkit-scrollbar-track { background: transparent; }
      .log-scroll::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
